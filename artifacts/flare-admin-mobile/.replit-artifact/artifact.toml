kind = "mobile"
previewPath = "/flare-admin-mobile/"
title = "Flare Admin (Mobile)"
version = "1.0.0"
id = "artifacts/flare-admin-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/flare-admin-mobile/" ]
localPort = 21275

[services.development]
run = "pnpm --filter @workspace/flare-admin-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flare-admin-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/flare-admin-mobile", "run", "serve" ]

[services.env]
PORT = "21275"
BASE_PATH = "/flare-admin-mobile/"
