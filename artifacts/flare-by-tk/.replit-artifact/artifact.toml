kind = "web"
previewPath = "/"
title = "Flare by TK"
version = "1.0.0"
id = "artifacts/flare-by-tk"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22091

[services.development]
run = "pnpm --filter @workspace/flare-by-tk run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flare-by-tk", "run", "build" ]

[services.production.run]
args = [ "pnpm", "--filter", "@workspace/flare-by-tk", "run", "start" ]

[services.production.run.env]
PORT = "22091"
NODE_ENV = "production"

[services.env]
PORT = "22091"
BASE_PATH = "/"
ADMIN_PASSWORD = "admin123"
